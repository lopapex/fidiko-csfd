[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[dev]
  command = "npm run dev:client"
  targetPort = 5173
  port = 8888
  publish = "dist"

[[redirects]]
  from = "/api/schedule"
  to = "/.netlify/functions/schedule"
  status = 200
