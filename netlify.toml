[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."refresh-schedule"]
  schedule = "0 22,23 * * *"

[functions."refresh-radar"]
  schedule = "15 22,23 * * *"

[dev]
  command = "npm run dev:client"
  targetPort = 5173
  port = 8888
  publish = "dist"

[[redirects]]
  from = "/api/schedule"
  to = "/.netlify/functions/schedule"
  status = 200

[[redirects]]
  from = "/api/radar"
  to = "/.netlify/functions/radar"
  status = 200
